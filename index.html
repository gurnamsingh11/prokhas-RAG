<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Backend Tester</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ──────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0e14;
    --surface:   #111620;
    --panel:     #161d2e;
    --border:    #1e2a3a;
    --border2:   #243040;
    --accent:    #00d4ff;
    --accent2:   #0099cc;
    --green:     #00e5a0;
    --amber:     #ffb830;
    --red:       #ff4757;
    --text:      #cdd6e8;
    --text-dim:  #5a6a82;
    --text-mid:  #8a9ab8;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    6px;
    --radius-lg: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Noise texture overlay ─────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
    opacity: 0.4;
  }

  /* ── Layout ────────────────────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 320px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .logo span { color: var(--text-dim); }

  .header-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

  .base-url-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 10px;
  }

  .base-url-wrap label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  #baseUrl {
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    width: 200px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Sidebar ───────────────────────────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Upload zone ───────────────────────────────────────────────────────── */
  .drop-zone {
    border: 1px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0, 212, 255, 0.04);
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
    filter: grayscale(1);
    transition: filter 0.2s;
  }

  .drop-zone:hover .drop-icon { filter: none; }

  .drop-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 11px;
    color: var(--text-dim);
  }

  .selected-file {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(0, 212, 255, 0.06);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    display: none;
    align-items: center;
    gap: 6px;
    text-align: left;
    word-break: break-all;
  }

  .selected-file.show { display: flex; }

  /* ── Upload button ─────────────────────────────────────────────────────── */
  .btn {
    width: 100%;
    padding: 9px 16px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
    margin-top: 10px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #00eaff; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    background: var(--border2);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    padding: 6px 10px;
    width: 100%;
    margin-top: 8px;
  }

  .btn-secondary:hover { background: rgba(0, 212, 255, 0.08); }
  .btn-secondary:disabled {
    border-color: var(--border2);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 11px;
    padding: 6px 10px;
    width: auto;
    margin-top: 0;
  }

  .btn-danger:hover { background: rgba(255, 71, 87, 0.1); }

  /* ── Append-zip mini drop zone ─────────────────────────────────────────── */
  .append-zone {
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .append-zone:hover, .append-zone.dragover {
    border-color: var(--green);
    background: rgba(0, 229, 160, 0.04);
  }

  .append-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
  }

  .append-zone-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
  }

  .append-zone-text strong {
    color: var(--green);
    font-weight: 600;
  }

  .append-selected {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--green);
    margin-top: 4px;
    display: none;
    align-items: center;
    gap: 4px;
  }

  .append-selected.show { display: flex; }

  .session-card-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }

  .session-card-actions .btn-danger {
    flex: 1;
  }

  /* ── Progress bar ──────────────────────────────────────────────────────── */
  .upload-progress {
    margin-top: 10px;
    display: none;
  }

  .upload-progress.show { display: block; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 5px;
  }

  /* ── Session card ──────────────────────────────────────────────────────── */
  .session-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: none;
  }

  .session-card.show { display: block; }

  .session-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    word-break: break-all;
    margin-bottom: 8px;
  }

  .session-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .meta-item {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 6px 8px;
  }

  .meta-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .meta-value {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    margin-top: 2px;
  }

  .session-files {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
    margin-bottom: 10px;
    line-height: 1.8;
  }

  .file-tag {
    display: inline-block;
    padding: 1px 6px;
    background: rgba(0, 212, 255, 0.07);
    border: 1px solid var(--border2);
    border-radius: 3px;
    margin: 2px;
    color: var(--text-mid);
  }

  /* ── Sessions list ─────────────────────────────────────────────────────── */
  .sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .sessions-list::-webkit-scrollbar { width: 4px; }
  .sessions-list::-webkit-scrollbar-track { background: transparent; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .empty-state {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
  }

  .session-item {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .session-item:hover { border-color: var(--border2); background: var(--panel); }
  .session-item.active {
    border-color: var(--accent);
    background: rgba(0, 212, 255, 0.05);
  }

  .session-item-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 28px;
  }

  .session-item-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .session-delete-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
    transition: all 0.15s;
  }

  .session-delete-btn:hover { color: var(--red); background: rgba(255,71,87,0.1); }

  /* ── Chat panel ────────────────────────────────────────────────────────── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  /* ── Chat empty state ──────────────────────────────────────────────────── */
  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
  }

  .chat-empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .chat-empty-title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-mid);
  }

  .chat-empty-sub {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    max-width: 280px;
    line-height: 1.7;
  }

  /* ── Chat header ───────────────────────────────────────────────────────── */
  .chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surface);
  }

  .chat-header.show { display: flex; }

  .chat-session-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .chat-session-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .live-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.3);
    color: var(--green);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Messages ──────────────────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.25s ease;
    max-width: 900px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.2);
  }

  .msg.assistant .msg-avatar {
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.2);
  }

  .msg.error .msg-avatar {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.2);
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-role {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .msg.user .msg-role { color: var(--accent); }
  .msg.assistant .msg-role { color: var(--green); }
  .msg.error .msg-role { color: var(--red); }

  .msg-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    word-break: break-word;
  }

  .msg.error .msg-text { color: var(--red); }

  /* ── Sources ───────────────────────────────────────────────────────────── */
  .sources-block {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .sources-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sources-title::before {
    content: '◈';
    color: var(--amber);
  }

  .source-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--amber);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 6px;
    transition: border-color 0.15s;
  }

  .source-card:hover { border-left-color: var(--accent); }

  .source-file {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .source-page {
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
  }

  .source-excerpt {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    font-style: italic;
  }

  /* ── Typing indicator ──────────────────────────────────────────────────── */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: typingBounce 1.2s infinite;
    opacity: 0.6;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input bar ─────────────────────────────────────────────────────────── */
  .input-bar {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: none;
    background: var(--surface);
    gap: 10px;
    align-items: flex-end;
  }

  .input-bar.show { display: flex; }

  .input-wrap {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #chatInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.6;
  }

  #chatInput::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #00eaff; transform: scale(1.05); }
  .send-btn:disabled {
    background: var(--border2);
    color: var(--text-dim);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Toast ─────────────────────────────────────────────────────────────── */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 16px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.25s ease;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .toast.success {
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.3);
    color: var(--green);
  }

  .toast.error {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: var(--red);
  }

  .toast.info {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.2);
    color: var(--accent);
  }

  /* ── Scrollbar global ──────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">RAG<span>/</span>TESTER</div>
    <div class="header-badge">v1.0</div>
    <div class="header-right">
      <div class="base-url-wrap">
        <label>API</label>
        <input id="baseUrl" type="text" value="http://localhost:8000" spellcheck="false" />
      </div>
      <div class="dot" id="serverDot" title="Server status"></div>
    </div>
  </header>

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Upload -->
    <div class="sidebar-section">
      <div class="section-label">Upload</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".zip" />
        <span class="drop-icon">📦</span>
        <div class="drop-title">Drop ZIP here</div>
        <div class="drop-sub">or click to browse</div>
      </div>

      <div class="selected-file" id="selectedFile">
        <span>📎</span>
        <span id="selectedFileName"></span>
      </div>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">Uploading...</div>
      </div>

      <button class="btn btn-primary" id="uploadBtn" disabled>
        ↑ &nbsp;Upload &amp; Index
      </button>

      <!-- Active session card -->
      <div class="session-card" id="sessionCard" style="margin-top:12px;">
        <div class="session-id" id="sessionCardId"></div>
        <div class="session-meta">
          <div class="meta-item">
            <div class="meta-label">Files</div>
            <div class="meta-value" id="sessionFiles">—</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Chunks</div>
            <div class="meta-value" id="sessionChunks">—</div>
          </div>
        </div>
        <div class="session-files" id="sessionFileNames"></div>

        <!-- Add more ZIP to this session -->
        <div class="append-zone" id="appendZone">
          <input type="file" id="appendFileInput" accept=".zip" />
          <span style="font-size:14px;">➕</span>
          <div class="append-zone-text"><strong>Add ZIP</strong> to this session</div>
        </div>
        <div class="append-selected" id="appendSelected">
          <span>📎</span><span id="appendFileName"></span>
        </div>

        <div class="upload-progress" id="appendProgress" style="margin-top:6px;">
          <div class="progress-bar"><div class="progress-fill" id="appendFill"></div></div>
          <div class="progress-label" id="appendLabel">Adding…</div>
        </div>

        <div class="session-card-actions">
          <button class="btn btn-secondary" id="appendBtn" disabled>↑ &nbsp;Add to Session</button>
          <button class="btn btn-danger" id="deleteCurrentBtn">✕</button>
        </div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="sidebar-section" style="padding-bottom:8px;">
      <div class="section-label">Sessions</div>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="empty-state">No sessions yet</div>
    </div>

  </aside>

  <!-- ── Chat panel ───────────────────────────────────────────────────────── -->
  <main class="chat-panel">

    <div class="chat-header" id="chatHeader">
      <span class="chat-session-label">Session</span>
      <span class="chat-session-id" id="chatSessionId"></span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>

    <div id="chatEmpty" class="chat-empty">
      <div class="chat-empty-icon">◈</div>
      <div class="chat-empty-title">No session selected</div>
      <div class="chat-empty-sub">Upload a ZIP archive on the left to create a session, then start chatting with your documents.</div>
    </div>

    <div class="messages" id="messages" style="display:none;"></div>

    <div class="input-bar" id="inputBar">
      <div class="input-wrap">
        <textarea id="chatInput" rows="1" placeholder="Ask a question about your documents…"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Send (Enter)">➤</button>
    </div>

  </main>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let activeSessionId = null;
let selectedFile    = null;
let appendFile      = null;
let isTyping        = false;

// ── Helpers ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function getBase() {
  return $('baseUrl').value.replace(/\/$/, '');
}

function api(path) {
  return `${getBase()}/api/v1${path}`;
}

// Toast
function toast(msg, type = 'info', dur = 3500) {
  const icons = { success: '✓', error: '✕', info: '◈' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  $('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), dur);
}

// Auto-resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Server health check ────────────────────────────────────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${getBase()}/health`, { signal: AbortSignal.timeout(3000) });
    $('serverDot').classList.toggle('live', r.ok);
  } catch {
    $('serverDot').classList.remove('live');
  }
}

setInterval(checkServer, 5000);
checkServer();
$('baseUrl').addEventListener('change', checkServer);

// ── File selection (new session) ───────────────────────────────────────────
const dropZone = $('dropZone');
const fileInput = $('fileInput');

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) handleFileSelect(f);
});

['dragover', 'dragleave', 'drop'].forEach(evt =>
  dropZone.addEventListener(evt, e => {
    e.preventDefault();
    if (evt === 'dragover') dropZone.classList.add('dragover');
    else {
      dropZone.classList.remove('dragover');
      if (evt === 'drop') {
        const f = e.dataTransfer.files[0];
        if (f) handleFileSelect(f);
      }
    }
  })
);

function handleFileSelect(f) {
  if (!f.name.toLowerCase().endsWith('.zip')) {
    toast('Only .zip files are supported', 'error');
    return;
  }
  selectedFile = f;
  $('selectedFileName').textContent = f.name;
  $('selectedFile').classList.add('show');
  $('uploadBtn').disabled = false;
}

// ── File selection (append to session) ────────────────────────────────────
const appendZone      = $('appendZone');
const appendFileInput = $('appendFileInput');

appendFileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) handleAppendFileSelect(f);
});

['dragover', 'dragleave', 'drop'].forEach(evt =>
  appendZone.addEventListener(evt, e => {
    e.preventDefault();
    if (evt === 'dragover') appendZone.classList.add('dragover');
    else {
      appendZone.classList.remove('dragover');
      if (evt === 'drop') {
        const f = e.dataTransfer.files[0];
        if (f) handleAppendFileSelect(f);
      }
    }
  })
);

function handleAppendFileSelect(f) {
  if (!f.name.toLowerCase().endsWith('.zip')) {
    toast('Only .zip files are supported', 'error');
    return;
  }
  appendFile = f;
  $('appendFileName').textContent = f.name;
  $('appendSelected').classList.add('show');
  $('appendBtn').disabled = false;
}

// ── Upload: create new session ─────────────────────────────────────────────
$('uploadBtn').addEventListener('click', async () => {
  if (!selectedFile) return;

  const btn = $('uploadBtn');
  const prog = $('uploadProgress');
  const fill = $('progressFill');
  const label = $('progressLabel');

  btn.disabled = true;
  btn.textContent = '⟳  Uploading…';
  prog.classList.add('show');
  fill.style.width = '30%';
  label.textContent = 'Uploading ZIP…';

  const form = new FormData();
  form.append('file', selectedFile, selectedFile.name);

  try {
    fill.style.width = '60%';
    label.textContent = 'Indexing documents…';

    const r = await fetch(api('/sessions/upload'), { method: 'POST', body: form });
    const body = await r.json();

    if (!r.ok) {
      throw new Error(body.detail || `HTTP ${r.status}`);
    }

    fill.style.width = '100%';
    label.textContent = 'Done!';
    toast(`Session created — ${body.chunks_indexed} chunks indexed`, 'success');

    setTimeout(() => {
      prog.classList.remove('show');
      fill.style.width = '0%';
      btn.textContent = '↑  Upload & Index';
      selectedFile = null;
      fileInput.value = '';
      $('selectedFile').classList.remove('show');
    }, 1200);

    await refreshSessions();
    activateSession(body.session_id, body);

  } catch (err) {
    fill.style.width = '0%';
    prog.classList.remove('show');
    btn.disabled = false;
    btn.textContent = '↑  Upload & Index';
    toast(`Upload failed: ${err.message}`, 'error', 5000);
  }
});

// ── Upload: append to existing session ────────────────────────────────────
$('appendBtn').addEventListener('click', async () => {
  if (!appendFile || !activeSessionId) return;

  const btn   = $('appendBtn');
  const prog  = $('appendProgress');
  const fill  = $('appendFill');
  const label = $('appendLabel');

  btn.disabled = true;
  btn.textContent = '⟳  Adding…';
  prog.classList.add('show');
  fill.style.width = '30%';
  label.textContent = 'Uploading ZIP…';

  const form = new FormData();
  form.append('file', appendFile, appendFile.name);

  try {
    fill.style.width = '60%';
    label.textContent = 'Indexing & merging…';

    const r = await fetch(api(`/sessions/${activeSessionId}/upload`), {
      method: 'POST',
      body: form,
    });
    const body = await r.json();

    if (!r.ok) {
      throw new Error(body.detail || `HTTP ${r.status}`);
    }

    fill.style.width = '100%';
    label.textContent = 'Merged!';

    toast(
      `+${body.files_added} file(s), +${body.chunks_added} chunks → ${body.total_chunks} total`,
      'success',
    );

    // Update session card counters immediately
    $('sessionFiles').textContent  = body.total_files;
    $('sessionChunks').textContent = body.total_chunks;

    // Append new file tags without clearing existing ones
    const existingTags = new Set(
      [...$('sessionFileNames').querySelectorAll('.file-tag')]
        .map(el => el.textContent)
    );
    // Re-fetch the session to get the full updated file list
    const infoR = await fetch(api(`/sessions/${activeSessionId}`));
    if (infoR.ok) {
      const info = await infoR.json();
      $('sessionFileNames').innerHTML = info.files_processed
        .map(f => `<span class="file-tag">${f}</span>`).join('');
    }

    // Append a system notice to the chat
    appendSystemMessage(`📦 Added ${body.files_added} more file(s) — ${body.chunks_added} new chunks merged into this session.`);

    setTimeout(() => {
      prog.classList.remove('show');
      fill.style.width = '0%';
      btn.textContent = '↑  Add to Session';
      appendFile = null;
      appendFileInput.value = '';
      $('appendSelected').classList.remove('show');
    }, 1200);

    await refreshSessions();

  } catch (err) {
    fill.style.width = '0%';
    prog.classList.remove('show');
    btn.disabled = false;
    btn.textContent = '↑  Add to Session';
    toast(`Append failed: ${err.message}`, 'error', 5000);
  }
});

// ── Sessions ───────────────────────────────────────────────────────────────
async function refreshSessions() {
  try {
    const r = await fetch(api('/sessions'));
    if (!r.ok) return;
    const sessions = await r.json();
    renderSessionsList(sessions);
  } catch { /* server down */ }
}

function renderSessionsList(sessions) {
  const container = $('sessionsList');
  if (!sessions.length) {
    container.innerHTML = '<div class="empty-state">No sessions yet</div>';
    return;
  }
  container.innerHTML = sessions.map(s => `
    <div class="session-item ${s.session_id === activeSessionId ? 'active' : ''}"
         data-sid="${s.session_id}"
         onclick="activateSessionFromList('${s.session_id}')">
      <div class="session-item-id">${s.session_id}</div>
      <div class="session-item-meta">
        ${s.files_processed.length} file${s.files_processed.length !== 1 ? 's' : ''} · ${s.chunks_indexed} chunks
      </div>
      <button class="session-delete-btn" title="Delete"
              onclick="event.stopPropagation(); deleteSession('${s.session_id}')">✕</button>
    </div>
  `).join('');
}

async function activateSessionFromList(sid) {
  try {
    const r = await fetch(api(`/sessions/${sid}`));
    if (!r.ok) { toast('Session not found', 'error'); return; }
    const meta = await r.json();
    activateSession(sid, {
      session_id: sid,
      files_processed: meta.files_processed.length,
      chunks_indexed: meta.chunks_indexed,
      _files: meta.files_processed,
    });
  } catch {
    toast('Could not load session', 'error');
  }
}

function activateSession(sid, meta) {
  activeSessionId = sid;

  // Reset any pending append file for the previous session
  appendFile = null;
  appendFileInput.value = '';
  $('appendSelected').classList.remove('show');
  $('appendProgress').classList.remove('show');
  $('appendFill').style.width = '0%';
  $('appendBtn').disabled = true;
  $('appendBtn').textContent = '↑  Add to Session';

  // Sidebar card
  $('sessionCardId').textContent = sid;
  $('sessionFiles').textContent  = meta.files_processed ?? meta._files?.length ?? '?';
  $('sessionChunks').textContent = meta.chunks_indexed ?? '?';

  const files = meta._files || [];
  $('sessionFileNames').innerHTML = files.map(f =>
    `<span class="file-tag">${f}</span>`
  ).join('');

  $('sessionCard').classList.add('show');

  // Chat panel
  $('chatSessionId').textContent = sid;
  $('chatHeader').classList.add('show');
  $('chatEmpty').style.display   = 'none';
  $('messages').style.display    = 'flex';
  $('inputBar').classList.add('show');

  // Clear messages for new session
  $('messages').innerHTML = '';
  appendSystemMessage(`Session activated. Ask anything about your ${meta.files_processed ?? meta._files?.length ?? ''} document(s).`);

  refreshSessions();
  $('chatInput').focus();
}

async function deleteSession(sid) {
  try {
    const r = await fetch(api(`/sessions/${sid}`), { method: 'DELETE' });
    if (!r.ok) { toast('Delete failed', 'error'); return; }

    toast('Session deleted', 'success');

    if (sid === activeSessionId) {
      activeSessionId = null;
      $('sessionCard').classList.remove('show');
      $('chatHeader').classList.remove('show');
      $('messages').style.display = 'none';
      $('inputBar').classList.remove('show');
      $('chatEmpty').style.display = 'flex';
    }

    refreshSessions();
  } catch {
    toast('Delete request failed', 'error');
  }
}

$('deleteCurrentBtn').addEventListener('click', () => {
  if (activeSessionId) deleteSession(activeSessionId);
});

// ── Chat ───────────────────────────────────────────────────────────────────
$('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$('chatInput').addEventListener('input', () => autoResize($('chatInput')));
$('sendBtn').addEventListener('click', sendMessage);

async function sendMessage() {
  const input = $('chatInput');
  const msg   = input.value.trim();
  if (!msg || !activeSessionId || isTyping) return;

  input.value = '';
  autoResize(input);
  isTyping = true;
  $('sendBtn').disabled = true;

  appendUserMessage(msg);
  const typingEl = appendTyping();

  try {
    const r = await fetch(api(`/sessions/${activeSessionId}/chat`), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    const body = await r.json();
    typingEl.remove();

    if (!r.ok) {
      appendErrorMessage(body.detail || `HTTP ${r.status}`);
    } else {
      appendAssistantMessage(body.answer, body.sources || []);
    }
  } catch (err) {
    typingEl.remove();
    appendErrorMessage(`Request failed: ${err.message}`);
  } finally {
    isTyping = false;
    $('sendBtn').disabled = false;
    input.focus();
  }
}

// ── Message renderers ──────────────────────────────────────────────────────
function appendUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="msg-avatar">👤</div>
    <div class="msg-body">
      <div class="msg-role">You</div>
      <div class="msg-text">${escapeHtml(text)}</div>
    </div>`;
  $('messages').appendChild(el);
  scrollToBottom();
}

function appendAssistantMessage(answer, sources) {
  const sourcesHtml = sources.length ? `
    <div class="sources-block">
      <div class="sources-title">Sources (${sources.length})</div>
      ${sources.map(s => `
        <div class="source-card">
          <div class="source-file">
            📄 ${escapeHtml(s.document_name)}
            ${s.page_label ? `<span class="source-page">p. ${escapeHtml(s.page_label)}</span>` : ''}
          </div>
          ${s.relevant_excerpt ? `<div class="source-excerpt">"${escapeHtml(s.relevant_excerpt)}"</div>` : ''}
        </div>
      `).join('')}
    </div>` : '';

  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `
    <div class="msg-avatar">◈</div>
    <div class="msg-body">
      <div class="msg-role">Assistant</div>
      <div class="msg-text">${escapeHtml(answer)}</div>
      ${sourcesHtml}
    </div>`;
  $('messages').appendChild(el);
  scrollToBottom();
}

function appendErrorMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg error';
  el.innerHTML = `
    <div class="msg-avatar">✕</div>
    <div class="msg-body">
      <div class="msg-role">Error</div>
      <div class="msg-text">${escapeHtml(text)}</div>
    </div>`;
  $('messages').appendChild(el);
  scrollToBottom();
}

function appendSystemMessage(text) {
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center; font-family: var(--mono); font-size:11px; color: var(--text-dim); padding: 4px 0;';
  el.textContent = text;
  $('messages').appendChild(el);
  scrollToBottom();
}

function appendTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `
    <div class="msg-avatar">◈</div>
    <div class="msg-body">
      <div class="msg-role">Assistant</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  $('messages').appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  const m = $('messages');
  m.scrollTop = m.scrollHeight;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ── Boot ───────────────────────────────────────────────────────────────────
refreshSessions();
setInterval(refreshSessions, 15000);
</script>
</body>
</html>
